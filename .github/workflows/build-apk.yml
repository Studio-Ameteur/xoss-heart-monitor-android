name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer (kivy/buildozer docker image)
        run: |
          docker run --rm -v "$(pwd)":/home/user/hostcwd kivy/buildozer:latest android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xoss-heart-monitor-apk
          path: bin/*.apk
